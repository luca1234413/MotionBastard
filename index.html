<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MotionBastard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app">

        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-dot" id="statusDot"></div>
            <span class="status-comp" id="statusComp">Not connected</span>
            <span class="status-divider">|</span>
            <span class="status-layer" id="statusLayer">No layer selected</span>
            <div style="flex:1"></div>
            <button class="btn-icon" id="clearBtn" title="Clear conversation">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6l-1 14H6L5 6"></path>
                    <path d="M10 11v6M14 11v6M9 6V4h6v2"></path>
                </svg>
            </button>
            <button class="btn-icon" id="settingsBtn" title="Settings">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12.22 2h-.44a2 2 0 00-2 2v.18a2 2 0 01-1 1.73l-.43.25a2 2 0 01-2 0l-.15-.08a2 2 0 00-2.73.73l-.22.38a2 2 0 00.73 2.73l.15.1a2 2 0 011 1.72v.51a2 2 0 01-1 1.74l-.15.09a2 2 0 00-.73 2.73l.22.38a2 2 0 002.73.73l.15-.08a2 2 0 012 0l.43.25a2 2 0 011 1.73V20a2 2 0 002 2h.44a2 2 0 002-2v-.18a2 2 0 011-1.73l.43-.25a2 2 0 012 0l.15.08a2 2 0 002.73-.73l.22-.39a2 2 0 00-.73-2.73l-.15-.08a2 2 0 01-1-1.74v-.5a2 2 0 011-1.74l.15-.09a2 2 0 00.73-2.73l-.22-.38a2 2 0 00-2.73-.73l-.15.08a2 2 0 01-2 0l-.43-.25a2 2 0 01-1-1.73V4a2 2 0 00-2-2z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
            </button>
        </div>

        <!-- Main Content -->
        <div class="main">

            <!-- Left: Chat Panel -->
            <div class="chat-panel" id="chatPanel">
                <div class="chat-messages" id="chatMessages">
                    <!-- Welcome state -->
                    <div class="welcome" id="welcomeState">
                        <div class="welcome-title">MotionBastard</div>
                        <div class="welcome-sub">Describe what you want. I'll figure out how to build it.</div>
                    </div>
                </div>

                <!-- Input Bar -->
                <div class="input-bar">
                    <div class="input-bar-inner">
                        <div class="input-images" id="inputImages"></div>
                        <div class="input-wrap">
                            <textarea id="chatInput" placeholder="描述你的动效需求... 遇到报错？直接截图给我" rows="3"></textarea>
                            <div class="input-bottom">
                                <button class="input-inline-btn" id="imgUploadBtn" title="Upload reference image (max 3)">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <line x1="12" y1="5" x2="12" y2="19"></line>
                                        <line x1="5" y1="12" x2="19" y2="12"></line>
                                    </svg>
                                </button>
                                <input type="file" class="file-input" id="imgFileInput" accept="image/png,image/jpeg,image/gif">
                                <div style="flex:1"></div>
                                <button class="input-send-btn" id="sendBtn" title="Send">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                        <line x1="12" y1="19" x2="12" y2="5"></line>
                                        <polyline points="5 12 12 5 19 12"></polyline>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: Preview / Code Panel -->
            <div class="right-panel" id="rightPanel">
                <div class="tabs">
                    <div class="tab active" data-tab="preview" id="tabPreview">Preview</div>
                    <div class="tab" data-tab="code" id="tabCode">Code</div>
                </div>

                <!-- Preview Tab -->
                <div class="preview-area" id="previewArea">
                    <div class="preview-container" id="previewContainer">
                        <div class="preview-empty">Preview will appear here<br>when animation code is generated</div>
                    </div>
                </div>

                <!-- Code Tab -->
                <div class="code-area" id="codeArea">
                    <div class="code-content" id="codeContent">
                        <pre id="codeText">// Generated code will appear here</pre>
                    </div>
                    <div class="code-actions">
                        <button class="btn btn-ghost" id="copyCodeBtn">Copy</button>
                        <button class="btn btn-primary hidden" id="executeBtn">Confirm & Execute</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="settings-overlay" id="settingsOverlay">
        <div class="settings-modal">
            <div class="settings-title">Settings</div>
            <div class="settings-group">
                <div class="settings-label">API Provider</div>
                <select class="settings-input" id="providerSelect">
                    <option value="openrouter">OpenRouter</option>
                    <option value="anthropic">Anthropic (Direct)</option>
                </select>
            </div>
            <div class="settings-group">
                <div class="settings-label">API Key</div>
                <input type="password" class="settings-input" id="apiKeyInput" placeholder="sk-or-... / sk-ant-...">
            </div>
            <div class="settings-group">
                <div class="settings-label">Model</div>
                <select class="settings-input" id="modelSelect">
                    <optgroup label="OpenRouter" id="modelsOpenRouter">
                        <option value="anthropic/claude-sonnet-4">Claude Sonnet 4</option>
                        <option value="anthropic/claude-opus-4">Claude Opus 4</option>
                        <option value="anthropic/claude-haiku-4">Claude Haiku 4</option>
                    </optgroup>
                    <optgroup label="Anthropic Direct" id="modelsAnthropic">
                        <option value="claude-sonnet-4-20250514">Claude Sonnet 4</option>
                        <option value="claude-opus-4-20250514">Claude Opus 4</option>
                    </optgroup>
                </select>
            </div>
            <div class="settings-actions">
                <button class="btn btn-ghost" id="settingsCancelBtn" style="flex:1">Cancel</button>
                <button class="btn btn-primary" id="settingsSaveBtn" style="flex:1">Save</button>
            </div>
        </div>
    </div>

    <script>if (typeof module === 'object') {window.module = module; module = undefined;}</script>
    <script src="js/CSInterface.js"></script>
    <script>if (window.module) module = window.module;</script>
    <script src="js/app.js"></script>
</body>
</html>
